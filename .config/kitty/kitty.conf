# ==========================================
# Theme & Fonts
# ==========================================

include ./theme.conf

# BEGIN_KITTY_FONTS
font_family      family="FiraCode Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# font_size        12.0
# adjust_line_height 100%


# Transparency and Window Management
background_opacity 0.85
# remember_window_size  yes
# initial_window_width  640
# initial_window_height 400



# ==========================================
# Clipboard & Integration
# ==========================================

copy_on_select yes
# allow_remote_control yes
# listen_on unix:/tmp/kitty
# shell_integration enabled


# ==========================================
# Window & Split Layouts
# ==========================================
enabled_layouts splits

# Navigation
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# Splitting Windows
map ctrl+- launch --location=hsplit --cwd=current
map ctrl+\ launch --location=vsplit --cwd=current

# Moving Windows
map ctrl+shift+left  move_window left
map ctrl+shift+right move_window right
map ctrl+shift+up    move_window up
map ctrl+shift+down  move_window down

# ==========================================
# Window Resizing
# ==========================================
map ctrl+left  resize_window narrower
map ctrl+right resize_window wider
map ctrl+up    resize_window taller
map ctrl+down  resize_window shorter
map ctrl+home  resize_window reset
